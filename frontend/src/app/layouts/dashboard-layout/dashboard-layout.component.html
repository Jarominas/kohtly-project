<div class="min-h-screen flex text-surface-0 bg-surface-900">
  <!-- Sidebar -->
  <div class="w-64 flex-shrink-0 flex flex-col border-r border-surface-700 bg-surface-800">
    <!-- Brand -->
    <div class="h-16 flex items-center px-6 border-b border-surface-700">
      <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center mr-3 font-bold">
        K
      </div>
      <span class="text-xl font-semibold tracking-wide">Kohtly</span>
    </div>

    <!-- Navigation -->
    <div class="flex-1 overflow-y-auto px-4 py-6 text-sm font-medium">
      <div class="mb-6">
        <ul class="space-y-1">
          <li>
            <a
              routerLink="/dashboard/main"
              routerLinkActive="bg-surface-700 text-primary-400"
              [routerLinkActiveOptions]="{ exact: true }"
              class="flex items-center px-2 py-2.5 rounded-md hover:bg-surface-700 hover:text-surface-0 transition-colors text-surface-300"
            >
              <i class="pi pi-home mr-3 text-lg"></i>
              <span>Home</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/dashboard/calendar"
              routerLinkActive="bg-surface-700 text-primary-400"
              class="flex items-center px-2 py-2.5 rounded-md hover:bg-surface-700 hover:text-surface-0 transition-colors text-surface-300"
            >
              <i class="pi pi-calendar mr-3 text-lg"></i>
              <span>Calendar</span>
            </a>
          </li>
          <li>
            <a
              routerLink="/dashboard/statistics"
              routerLinkActive="bg-surface-700 text-primary-400"
              class="flex items-center px-2 py-2.5 rounded-md hover:bg-surface-700 hover:text-surface-0 transition-colors text-surface-300"
            >
              <i class="pi pi-chart-bar mr-3 text-lg"></i>
              <span>Statistics</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0 bg-[#343a46]">
    <!-- Topbar -->
    <div class="h-16 flex items-center justify-end px-6 border-b border-surface-700 bg-surface-800">
      <div class="flex items-center gap-6">
        <i
          class="pi pi-bell text-surface-400 hover:text-surface-0 transition-colors cursor-pointer text-lg"
        ></i>
        <p-avatar
          image="https://primefaces.org/cdn/primeng/images/avatar/amyelsner.png"
          shape="circle"
          styleClass="w-8 h-8 cursor-pointer ring-2 ring-surface-700"
        ></p-avatar>
      </div>
    </div>

    <!-- Content Area -->
    <div class="flex-1 p-6 overflow-y-auto">
      <div class="border-2 border-dashed border-surface-600 rounded-xl h-full p-4">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>

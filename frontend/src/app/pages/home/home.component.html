<section class="max-w-6xl px-4 py-8 mx-auto sm:px-6 lg:px-8">

    <div class="flex flex-col gap-2">
      <h1 class="text-4xl font-bold tracking-tight text-color">Theme & Surface Color Tester</h1>
      <p class="text-lg text-muted-color">Inspect the defined surface tokens from colors.ts</p>
    </div>
  </div>

  <p-card header="Surface Dark Mode Tiers" styleClass="w-full">

      <div class="mb-4">

  <p-card header="Primary Colors" styleClass="w-full mt-6">
